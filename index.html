<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senhas · Achadapão</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Archivo:wght@900&display=swap" rel="stylesheet">

<style>
  :root{
    --fundo:   #f1efe9;
    --tinta:   #3a2414;
    --accent:  #9c4a26;
    --linha:   rgba(58,36,20,0.16);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    background:var(--fundo);
    color:var(--tinta);
    font-family:"Oswald","Archivo",system-ui,-apple-system,"Segoe UI",sans-serif;
    height:100vh; overflow:hidden;
    cursor:none; user-select:none; -webkit-user-select:none; outline:none;
  }

  .ecra{ display:flex; flex-direction:row; align-items:stretch; width:100vw; height:100vh; }

  /* --- Lado esquerdo: carrossel de media --- */
  .lado-media{ flex:1 1 44%; position:relative; overflow:hidden; background:var(--fundo); }
  .palco{ position:absolute; inset:0; }
  .palco .media{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:contain;            /* mostra a media inteira; troca por "cover" para preencher tudo */
    opacity:0; transition:opacity .6s ease;
  }
  .palco .media.ativo{ opacity:1; }
  .aviso-media{
    display:none; position:absolute; inset:0; z-index:5;
    flex-direction:column; align-items:center; justify-content:center; text-align:center;
    padding:8%; background:var(--fundo); color:var(--tinta);
    font-size:clamp(0.9rem,2.2vmin,1.4rem); line-height:1.5;
  }

  /* --- Lado direito: senha (inalterado) --- */
  .lado-senha{
    flex:1 1 56%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    border-left:2px solid var(--linha); padding:4vmin;
  }
  .rotulo{
    font-weight:700; letter-spacing:0.5em; text-transform:uppercase;
    font-size:clamp(1rem, 3.2vmin, 2.6rem);
    color:var(--accent); padding-left:0.5em; margin-bottom:0.05em;
  }
  .numero{
    font-family:"Archivo","Oswald",system-ui,sans-serif;
    font-weight:900; font-size:min(60vh, 26vw);
    line-height:0.88; white-space:nowrap;
    font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1;
    color:var(--tinta); transition:transform .12s ease;
  }
  .numero.flare{ animation:flare .45s ease; }
  @keyframes flare{ 0%{transform:scale(1);} 35%{transform:scale(1.06);} 100%{transform:scale(1);} }

  /* --- Logótipo pequeno no canto superior direito --- */
  .marca-canto{
    position:fixed; top:clamp(0.6rem,2vh,1.4rem); right:clamp(0.8rem,2vw,1.6rem);
    height:clamp(48px,9vh,110px); width:auto; z-index:50; opacity:0.95; pointer-events:none;
  }

  .debug{
    display:none; position:fixed; bottom:1rem; left:50%; transform:translateX(-50%);
    font-family:monospace; font-size:1rem; color:#fff; background:rgba(58,36,20,0.92);
    padding:0.6rem 1rem; border-radius:0.5rem; z-index:99; letter-spacing:0.05em;
  }

  @media (max-width:760px){
    .ecra{ flex-direction:column; }
    .lado-senha{ border-left:none; border-top:2px solid var(--linha); }
    .numero{ font-size:min(34vh, 60vw); }
    .marca-canto{ height:42px; }
  }
  @media (prefers-reduced-motion: reduce){
    .numero,.numero.flare{ transition:none; animation:none; }
    .palco .media{ transition:none; }
  }
</style>
</head>

  <audio id="ding" src="ding.mp3" preload="auto"></audio>

<script>
  /* ============================================================
     MEDIA A RODAR NO LADO ESQUERDO
     Lista aqui os teus ficheiros (imagens e/ou vídeos), pela ordem
     em que queres que apareçam. Coloca-os na MESMA pasta deste
     ficheiro. Aceita .jpg .png .webp e vídeos .mp4 .webm
     ============================================================ */
  const MEDIA = [
    "armonio.png",
    "avolurdes.png",
    "coracao.jpg",
    "diamae1.jpg",
    "logo.jpg",
    "diamae2.jpg",
    "forno.jpg",
    "lenha.png",
    "saloio1.jpg",
  ];
  const SEGUNDOS_IMAGEM = 8;   // tempo de cada imagem no ecrã
  /* ============================================================ */

  const palco = document.getElementById("palco");
  const LOGO  = document.getElementById("marca").src;
  const EXT_VIDEO = ["mp4","webm","ogg","ogv","mov","m4v"];

  function ehVideo(src){
    const ext = src.split("?")[0].split(".").pop().toLowerCase();
    return EXT_VIDEO.includes(ext);
  }

  let idx = -1, timer = null, atual = null, falhas = 0;

  function proximo(){
    if(MEDIA.length === 0) return;
    idx = (idx + 1) % MEDIA.length;
    mostrarMedia(MEDIA[idx]);
  }

  function sucesso(){ falhas = 0; document.getElementById("aviso-media").style.display = "none"; }

  function saltar(){
    falhas++;
    if(falhas >= MEDIA.length){ mostrarErro(); return; }  // todas falharam: para de tentar
    proximo();
  }

  function mostrarErro(){
    clearTimeout(timer);
    const aviso = document.getElementById("aviso-media");
    const local = location.protocol === "file:";
    aviso.innerHTML =
      "N\u00e3o consegui carregar as imagens." +
      (local
        ? "<br><br>Est\u00e1s a abrir o ficheiro diretamente no aparelho (<b>file://</b>). " +
          "Muitos browsers Android bloqueiam imagens locais assim.<br>" +
          "Abre a p\u00e1gina por um endere\u00e7o <b>http(s)</b> (alojada online) para funcionar."
        : "<br><br>Confirma que os ficheiros est\u00e3o na mesma pasta do index.html e que os nomes batem certo.");
    aviso.style.display = "flex";
  }

  function mostrarMedia(src){
    clearTimeout(timer);
    let el;
    if(ehVideo(src)){
      el = document.createElement("video");
      el.src = src; el.muted = true; el.autoplay = true;
      el.setAttribute("playsinline",""); el.playsInline = true;
      el.loop = (MEDIA.length === 1);
      el.className = "media";
      el.addEventListener("loadeddata", sucesso);
      if(!el.loop) el.addEventListener("ended", proximo);
      el.addEventListener("error", saltar);
      palco.appendChild(el);
      el.play().catch(()=>{});
    } else {
      el = document.createElement("img");
      el.src = src; el.className = "media";
      el.addEventListener("load", sucesso);
      el.addEventListener("error", saltar);
      palco.appendChild(el);
      timer = setTimeout(proximo, SEGUNDOS_IMAGEM * 1000);
    }
    requestAnimationFrame(()=> requestAnimationFrame(()=> el.classList.add("ativo")));
    const anterior = atual; atual = el;
    if(anterior){ anterior.classList.remove("ativo"); setTimeout(()=> anterior.remove(), 700); }
  }

  function iniciarMedia(){
    if(MEDIA.length === 0){
      // Sem media configurada: mostra o logótipo como fundo
      const f = document.createElement("img");
      f.src = LOGO; f.className = "media ativo";
      f.style.padding = "7%";
      palco.appendChild(f);
      return;
    }
    proximo();
  }

  /* ===================== SENHA ===================== */
  const elNumero = document.getElementById("numero");
  const ding     = document.getElementById("ding");
  const elDebug  = document.getElementById("debug");
  const DEBUG    = location.hash.toLowerCase().includes("debug");
  if(DEBUG){ elDebug.style.display = "block"; elDebug.textContent = "Prime uma tecla do comando..."; }

  let senha = 0; const MIN = 0, MAX = 999; let ultimoAvanco = 0;

  function mostrar(){ elNumero.textContent = String(senha).padStart(2, "0"); }
  function tocarSom(){ if(!ding) return; try{ ding.currentTime = 0; ding.play().catch(()=>{}); }catch(e){} }
  function avivar(){ elNumero.classList.remove("flare"); void elNumero.offsetWidth; elNumero.classList.add("flare"); }

  function avancar(){
    const agora = Date.now();
    if(agora - ultimoAvanco < 200) return; ultimoAvanco = agora;
    if(senha < MAX){ senha++; mostrar(); tocarSom(); avivar(); }
  }
  function recuar(){ if(senha > MIN){ senha--; mostrar(); avivar(); } }
  function reiniciar(){ senha = 0; mostrar(); avivar(); }

  function ehOK(e){ return e.key==="Enter"||e.key==="Select"||e.keyCode===13||e.keyCode===23; }
  function ehAvancar(e){ return ehOK(e)||e.key===" "||e.key==="Spacebar"||e.key==="PageDown"; }
  function ehRecuar(e){ return e.key==="ArrowLeft"||e.key==="PageUp"; }
  function ehReiniciar(e){ return e.key==="r"||e.key==="R"; }

  document.addEventListener("keydown", (e) => {
    if(DEBUG){ elDebug.textContent = 'key="'+e.key+'"   code="'+e.code+'"   keyCode='+e.keyCode; }
    if(e.repeat) return;
    if(ehAvancar(e)){ e.preventDefault(); avancar(); }
    else if(ehRecuar(e)){ e.preventDefault(); recuar(); }
    else if(ehReiniciar(e)){ reiniciar(); }
  });

  document.body.addEventListener("click", avancar);
  window.addEventListener("load", () => { try{ document.body.focus(); }catch(e){} });

  mostrar();
  iniciarMedia();
</script>
</body>
</html>
